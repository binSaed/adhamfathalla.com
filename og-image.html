<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: "Inter", -apple-system, sans-serif;
    background-color: #1C1917;
    background-image:
      radial-gradient(900px 500px at 18% 12%, rgba(161,98,7,0.30), transparent 60%),
      radial-gradient(700px 500px at 95% 100%, rgba(161,98,7,0.14), transparent 55%);
    color: #FAFAF9;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 90px;
    position: relative;
    overflow: hidden;
  }
  .ring {
    position: absolute;
    border: 1px solid rgba(161,98,7,0.25);
    border-radius: 50%;
  }
  .ring.a { width: 520px; height: 520px; top: -160px; right: -120px; }
  .ring.b { width: 320px; height: 320px; top: -60px; right: 20px; border-color: rgba(161,98,7,0.18); }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #D9A441;
    margin-bottom: 34px;
  }
  .eyebrow .dot { width: 12px; height: 12px; border-radius: 50%; background: #D9A441; box-shadow: 0 0 18px #D9A441; }

  .domain {
    font-family: "Playfair Display", Georgia, serif;
    font-weight: 700;
    font-size: 104px;
    line-height: 1.0;
    letter-spacing: -1.5px;
  }
  .domain .tld { color: #D9A441; font-style: italic; }

  .sub {
    margin-top: 30px;
    font-size: 30px;
    font-weight: 400;
    color: #C9C4BE;
    max-width: 820px;
  }

  .footer {
    position: absolute;
    bottom: 56px;
    left: 90px;
    right: 90px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 24px;
    color: #A8A29E;
    border-top: 1px solid rgba(214,211,209,0.18);
    padding-top: 26px;
  }
  .footer .contact { color: #FAFAF9; font-weight: 500; }
</style>
</head>
<body>
  <div class="ring a"></div>
  <div class="ring b"></div>

  <div class="eyebrow"><span class="dot"></span> Premium Domain For Sale</div>
  <div class="domain">adhamfathalla<span class="tld">.com</span></div>
  <div class="sub">A clean, memorable .com for your personal brand or business.</div>

  <div class="footer">
    <span>Make an offer today</span>
    <span class="contact">me@bnsaed.com &nbsp;·&nbsp; +20 11 51034858</span>
  </div>
</body>
</html>
